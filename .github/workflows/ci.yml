name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Flutter lint ─────────────────────────────────────────────────────────────
  flutter-lint:
    name: Flutter Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze (fail on any error)
        run: flutter analyze --fatal-infos --fatal-warnings

  # ── Flutter tests ─────────────────────────────────────────────────────────────
  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests with coverage
        run: flutter test --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: flutter

  # ── Flutter build ─────────────────────────────────────────────────────────────
  flutter-build:
    name: Flutter Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK (release)
        run: flutter build apk --release
          --dart-define=API_KEY=${{ secrets.API_KEY }}
          --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

  # ── Backend lint ──────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: pip install flake8 black
      - name: Run flake8
        run: flake8 backend/lambdas/ --max-line-length=100 --exclude=__pycache__
      - name: Check black formatting
        run: black --check backend/lambdas/ --line-length=100

  # ── Backend tests ─────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: pip install pytest pytest-cov boto3 moto
      - name: Run pytest with coverage
        run: pytest backend/ --cov=backend/lambdas --cov-report=xml
          --cov-fail-under=80 -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: backend
