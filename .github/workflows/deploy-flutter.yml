name: Deploy Flutter

on:
  push:
    branches: [main]

jobs:
  # ── Build Android APK with keystore signing ───────────────────────────────────
  build-android:
    name: Build Android (Release)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode \
            > android/app/keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEY_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build signed APK
        run: flutter build apk --release
          --dart-define=API_KEY=${{ secrets.API_KEY }}
          --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: devopsgpt-release-${{ github.sha }}
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Deploy to Firebase App Distribution ──────────────────────────────────────
  deploy-firebase:
    name: Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: devopsgpt-release-${{ github.sha }}
          path: dist/

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:       ${{ secrets.FIREBASE_APP_ID }}
          token:       ${{ secrets.FIREBASE_TOKEN }}
          groups:      testers
          file:        dist/app-release.apk
          releaseNotes: |
            Build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}
