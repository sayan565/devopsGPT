name: Deploy Lambdas

on:
  push:
    branches: [main]
    paths: [backend/**]
  workflow_dispatch:

env:
  AWS_REGION: "us-east-1"
  PYTHON_VERSION: "3.12"

jobs:
  deploy:
    name: Package & Deploy Lambdas
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt --target backend/package/
          cp -r backend/shared backend/package/

      - name: Deploy each Lambda
        run: |
          LAMBDAS=(
            "list_servers"
            "alert_processor"
            "ai_analyzer"
            "auto_healer"
            "metrics_streamer"
            "websocket_handler"
            "tenant_onboarding"
          )

          ENV="${{ github.ref == 'refs/heads/main' && 'dev' || 'dev' }}"
          PREFIX="devopsgpt-${ENV}"

          for lambda in "${LAMBDAS[@]}"; do
            echo "==> Packaging $lambda..."
            cp -r backend/lambdas/$lambda/* backend/package/
            cd backend/package
            zip -r ../../${lambda}.zip . -q
            cd ../..

            echo "==> Deploying $lambda to ${PREFIX}-${lambda}..."
            aws lambda update-function-code \
              --function-name "${PREFIX}-${lambda}" \
              --zip-file "fileb://${lambda}.zip" \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager

            # Clean lambda-specific files before next iteration
            for f in backend/lambdas/$lambda/*; do
              fname=$(basename $f)
              rm -f backend/package/$fname
            done

            rm -f ${lambda}.zip
          done

      - name: Verify deployments
        run: |
          ENV="dev"
          PREFIX="devopsgpt-${ENV}"
          for lambda in list_servers alert_processor ai_analyzer auto_healer metrics_streamer websocket_handler; do
            aws lambda get-function \
              --function-name "${PREFIX}-${lambda}" \
              --query 'Configuration.[FunctionName,LastModified,State]' \
              --output table \
              --no-cli-pager
          done
