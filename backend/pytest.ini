[pytest]
# Add each Lambda directory to pythonpath so test files can import handler directly
# This replaces sys.path manipulation in conftest.py
pythonpath =
    lambdas/ai_analysis
    lambdas/ai_analyzer
    lambdas/alert_processor
    lambdas/auto_healer
    lambdas/cloudwatch_poller
    lambdas/data_collector
    lambdas/fix_executor
    lambdas/list_servers
    lambdas/metrics_streamer
    lambdas/tenant_onboarding
    lambdas/tenant_lookup
    lambdas/websocket_handler
    lambdas/shared

testpaths = lambdas
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum coverage threshold enforced in CI
addopts = -v --tb=short
